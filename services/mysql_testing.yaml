services:
  mysql_testing:
    image: mysql:8.4.8
    container_name: ${NAMESPACE}-mysql_testing
    restart: unless-stopped
    ports:
      - "${MYSQL_TESTING_PORT}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_TESTING_DATABASE}
      MYSQL_USER: ${MYSQL_TESTING_USER}
      MYSQL_PASSWORD: ${MYSQL_TESTING_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_TESTING_ROOT_PASSWORD}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql_testing
    command: mysqld --sql_mode="NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"
    tmpfs:
      - /var/lib/mysql:rw
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p${MYSQL_TESTING_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      options:
        max-size: "1m"
        max-file: "10"
    networks:
      - local-network
